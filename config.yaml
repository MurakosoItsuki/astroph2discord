# ===========================================================================
# arxiv2discord configuration
# ===========================================================================

# arXiv categories to monitor. Default below covers all six astro-ph
# subcategories. Remove any you don't care about to cut noise.
categories:
  - astro-ph.GA   # Astrophysics of Galaxies
  - astro-ph.CO   # Cosmology and Nongalactic Astrophysics
  - astro-ph.EP   # Earth and Planetary Astrophysics
  - astro-ph.HE   # High Energy Astrophysical Phenomena
  - astro-ph.IM   # Instrumentation and Methods for Astrophysics
  - astro-ph.SR   # Solar and Stellar Astrophysics

# How many days back to look. With the seen-id cache enabled (default), a few
# days of overlap is safe: papers already notified are never repeated, and a
# missed/failed daily run is recovered on the next run. 3 covers weekends.
days: 3

# Which date to filter/sort by:
#   updated   -> last-updated date (also catches v2 replacements & updates)
#   submitted -> original submission date only
date_field: updated

# Safety cap on how many papers to pull from the API per run.
max_results: 400

# Only notify when the summed keyword score is >= this value.
score_threshold: 3

# On days with no new matching papers, still post a one-line "no new papers
# today" message so you can tell the tool ran (vs. silently broken).
# Set to false if you prefer complete silence on quiet days.
heartbeat: true

# ---------------------------------------------------------------------------
# Japanese translation (DeepL)
# ---------------------------------------------------------------------------
# Set translate: true to append a Japanese translation of the title and
# abstract. Requires a DeepL API key in the DEEPL_API_KEY environment variable
# (add it as a GitHub Actions secret). Free keys end with ":fx".
translate: true
translate_lang: JA

# ---------------------------------------------------------------------------
# Author highlighting (optional)
# ---------------------------------------------------------------------------
# Papers by any of these authors are flagged with ⭐ and their names bolded.
# Matching is case-insensitive substring (use a surname or "First Last").
# Set author_bonus >= score_threshold to guarantee your own papers always
# notify, even if no keyword matches. Leave the list empty to disable.
highlight_authors: []
#  - Yamaguchi
#  - Machida
author_bonus: 0

# Keyword: weight. A paper's score = sum of weights of keywords found in its
# title + abstract (case-insensitive substring match).
keywords:
  circumplanetary disk: 1
  protostellar: 1
  protostar: 1
  protoplanetary: 1
  protoplanetary disk: 1
  protoplanetary disc: 1
  circumstellar disk: 1
  circumstellar disc: 1
  secular gravitational instability: 1
  Population III: 4
  Pop III: 4
  first star: 4
  first stars: 4
  metal-poor: 3
  metal poor: 3
  low-metallicity: 3
  low metallicity: 3
  extremely metal-poor: 4
  EMP: 2

  primordial: 3
  primordial cloud: 3
  early universe: 3

  star formation: 2
  star-forming: 2
  protostar: 2
  prestellar core: 2
  molecular cloud: 1

  fragmentation: 3
  accretion disk: 1
  magnetic field: 3
  magnetized: 3
  magnetohydrodynamics: 3
  MHD: 2
  non-ideal MHD: 4
  turbulence: 3
  turbulent: 2
  turbulent dynamo: 3
  outflow: 2
  initial mass function: 2
  IMF: 2
